# Conda recipe for OpenGNC

{% set name = "opengnc" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../.. # Assuming local build/test for now, or git url for distribution

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=61.0
  run:
    - python >=3.10
    - numpy >=1.20.0
    - scipy >=1.7.0
    - pymsis >=0.6.0
    - ppigrf >=0.1.0
    - sgp4 >=2.21
    - casadi >=3.6.0
    - plotly >=5.0.0
    - pandas >=1.3.0
    - dash >=2.0.0

test:
  imports:
    - opengnc
  commands:
    - pytest --help # Simple verification

about:
  home: https://github.com/BatuhanAkkova/OpenGNC
  summary: A Guidance, Navigation, and Control toolkit for spacecraft.
  license: MIT
  license_file: LICENSE




